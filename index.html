  <script>
    window.__SYNAPSE_ENV__ = {
      isMobile: /Android|iPhone|iPad|iPod/i.test(navigator.userAgent),
      isDesktop: window.innerWidth >= 1024,
      prefersDark: window.matchMedia('(prefers-color-scheme: dark)').matches,
      prefersReducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
      connection: navigator.connection ? navigator.connection.effectiveType : '4g',
      supportsWasm: typeof WebAssembly !== 'undefined',
      hardwareConcurrency: navigator.hardwareConcurrency || 4
    };
    (function() {
      var storedTheme = null;
      var storedLang = null;
      try {
        var prefsRaw = localStorage.getItem('synapse_preferences');
        if (prefsRaw) {
          var prefs = JSON.parse(prefsRaw);
          storedTheme = prefs.theme;
          storedLang = prefs.language;
        }
      } catch(e) {}
      var theme = storedTheme || (window.__SYNAPSE_ENV__.prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
      var lang = storedLang || (navigator.language.startsWith('fa') ? 'fa' : 'en');
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'fa' ? 'rtl' : 'ltr';
    })();
  </script>
